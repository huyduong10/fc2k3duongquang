services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: football-backend
    env_file:
      - ./backend/.env
    environment:
      CLIENT_URL: http://localhost
      PORT: 5000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    container_name: football-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
